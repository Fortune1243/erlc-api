name: Feature request
description: Suggest a new API, utility, or documentation improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to build, and what is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, helper, or docs change you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other libraries have you tried?
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps optional dependencies behind extras when needed.
        - label: This does not make command execution implicit or public-facing by default.
        - label: I am willing to help test or document this feature.
