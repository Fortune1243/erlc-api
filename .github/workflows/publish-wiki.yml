name: Publish Wiki

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit message for wiki sync"
        required: false
        default: "docs(wiki): sync from docs/wiki"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish wiki
        env:
          WIKI_COMMIT_MESSAGE: ${{ github.event.inputs.commit_message }}
          REPO_AUTH_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          bash scripts/publish_wiki.sh \
            --repo-url "$REPO_AUTH_URL" \
            --source-dir docs/wiki \
            --wiki-dir .wiki-worktree \
            --push
